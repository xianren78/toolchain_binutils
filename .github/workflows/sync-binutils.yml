name: Sync OpenWrt toolchain/binutils

on:
  workflow_dispatch:
  schedule:
    - cron: '18 3 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sparse clone upstream directory
        run: |
          set -e

          git clone --depth=1 --filter=blob:none --sparse \
            --branch openwrt-25.12 \
            https://github.com/openwrt/openwrt.git upstream-openwrt

          cd upstream-openwrt
          git sparse-checkout set toolchain/binutils

      - name: Replace repo contents with upstream binutils directory
        run: |
          set -e

          mkdir -p /tmp/binutils-sync

          rsync -a --delete \
            --exclude '.git' \
            upstream-openwrt/toolchain/binutils/ \
            /tmp/binutils-sync/

          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name '.github' \
            -exec rm -rf {} +

          rsync -a /tmp/binutils-sync/ ./

          rm -rf /tmp/binutils-sync upstream-openwrt

      - name: Commit changes
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git add -A
          git commit -m "sync: openwrt-25.12 toolchain/binutils"

      - name: Push changes
        run: |
          git push
