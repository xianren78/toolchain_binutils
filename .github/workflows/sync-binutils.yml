name: Sync OpenWrt toolchain/binutils to branch

on:
  workflow_dispatch:
  schedule:
    - cron: '18 3 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare target branch
        shell: bash
        run: |
          set -euo pipefail

          TARGET_BRANCH="openwrt-25.12"

          git fetch origin "${TARGET_BRANCH}:${TARGET_BRANCH}" 2>/dev/null || true

          if git show-ref --verify --quiet "refs/heads/${TARGET_BRANCH}"; then
            git checkout "${TARGET_BRANCH}"
          else
            git checkout --orphan "${TARGET_BRANCH}"
            find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
            mkdir -p .github/workflows
          fi

      - name: Restore workflow file on orphan branch if needed
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .github/workflows

          if [ ! -f .github/workflows/sync-binutils.yml ]; then
            git show "${GITHUB_SHA}:.github/workflows/sync-binutils.yml" > .github/workflows/sync-binutils.yml
          fi

      - name: Sparse clone upstream toolchain/binutils
        shell: bash
        run: |
          set -euo pipefail

          git clone \
            --depth=1 \
            --filter=blob:none \
            --sparse \
            --branch openwrt-25.12 \
            https://github.com/openwrt/openwrt.git upstream-openwrt

          cd upstream-openwrt
          git sparse-checkout set toolchain/binutils

          echo "UPSTREAM_COMMIT=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Sync upstream files to target branch root
        shell: bash
        run: |
          set -euo pipefail

          TMP_DIR="$(mktemp -d)"

          rsync -a --delete \
            --exclude='.git' \
            upstream-openwrt/toolchain/binutils/ \
            "${TMP_DIR}/"

          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name '.github' \
            -exec rm -rf {} +

          rsync -a --delete \
            "${TMP_DIR}/" \
            ./

          rm -rf "${TMP_DIR}" upstream-openwrt

      - name: Show changes
        shell: bash
        run: |
          set -euo pipefail
          git status --short

      - name: Commit changes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "sync: openwrt/toolchain/binutils @ ${UPSTREAM_COMMIT}"

      - name: Push target branch
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:openwrt-25.12
